<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Expedition Solver FULL v2</title>
<style>
body { font-family: sans-serif; padding: 10px; }
pre { background:#111; color:#0f0; padding:10px; }
</style>
</head>
<body>

<h2>Expedition Solver FULL v2</h2>

<label>主軸:</label>
<select id="axis">
    <option value="0">A</option>
    <option value="1">B</option>
    <option value="2">C</option>
</select>

<br><br>

<label>目標A:</label>
<input id="targetA" value="10">

<label>目標B:</label>
<input id="targetB" value="10">

<label>目標C:</label>
<input id="targetC" value="10">

<label>目標D:</label>
<input id="targetD" value="10">

<br><br>

<label>チーム補正:</label>
<select id="tb">
    <option value="1,1,0,0">[1,1,0,0]</option>
    <option value="0,0,1,1">[0,0,1,1]</option>
    <option value="1,0,0,1">[1,0,0,1]</option>
</select>

<br><br>

<button onclick="run()">実行</button>

<pre id="out"></pre>

<script>

let data = null;

fetch('./buddies_master.json')
    .then(r => r.json())
    .then(j => data = j);

// パフューム（2択）
const perfumes = [
    [0,0,0,2], // D+2
    [1,1,1,1]  // A/B/C +1
];

function add(a,b){
    return [a[0]+b[0], a[1]+b[1], a[2]+b[2], a[3]+b[3]];
}

function clamp(v){
    return v.map(x => Math.max(0, Math.min(10, x)));
}

// variable適用（完全実装）
function applyVariable(cur, countMap){

    for(const v of data.variable){
        const n = countMap[v.name] || 0;
        const idx = statIndex(v.target_stat);

        if(v.calc_type === "scale_by_x"){
            cur[idx] += n;
        }

        else if(v.calc_type === "flat_4_if_3"){
            if(n >= 3){
                cur[idx] += 4;
            }
        }

        else if(v.calc_type === "item_2_if_3"){
            if(n >= 3){
                cur[3] += 2; // D固定
            }
        }
    }

    return cur;
}

function statIndex(s){
    if(s === "a") return 0;
    if(s === "b") return 1;
    if(s === "c") return 2;
    if(s === "d") return 3;
}

function run(){

    if(!data) return;

    const axis = +document.getElementById("axis").value;

    const target = [
        +document.getElementById("targetA").value,
        +document.getElementById("targetB").value,
        +document.getElementById("targetC").value,
        +document.getElementById("targetD").value
    ];

    const tb = document.getElementById("tb")
        .value.split(",").map(Number);

    const result = [];

    dfs([], [], {}, 6, axis, target, tb, result);

    document.getElementById("out").textContent =
        "結果数: " + result.length + "\n\n" +
        JSON.stringify(result.slice(0,10), null, 2);
}


// DFS本体
function dfs(path, curList, countMap, r, axis, target, tb, result){

    let cur = [0,0,0,0];

    for(const c of curList){
        cur = add(cur, [c.a,c.b,c.c,c.d]);
    }

    cur = add(cur, tb);

    // variable適用（探索後評価）
    let vcur = applyVariable([...cur], countMap);

    vcur = clamp(vcur);

    // ■枝切り（軸依存・正規版）

    const perfumeMax = (axis === 3) ? 2 : 1;

    const maxAxis =
        vcur[axis] +
        r * 3 +
        perfumeMax;

    if(maxAxis < target[axis]) return;

    if(r === 0){

        for(const p of perfumes){

            let final = add(vcur, p);
            final = clamp(final);

            let ok = true;
            for(let i=0;i<4;i++){
                if(final[i] < target[i]){
                    ok = false;
                    break;
                }
            }

            if(ok){
                result.push({
                    path: path.map(x => x.name),
                    result: final
                });
            }
        }

        return;
    }

    for(const c of data.immutable){

        const newCount = {...countMap};
        newCount[c.name] = (newCount[c.name] || 0) + 1;

        dfs(
            [...path, c],
            [...curList, c],
            newCount,
            r - 1,
            axis,
            target,
            tb,
            result
        );
    }
}

</script>

</body>
</html>
